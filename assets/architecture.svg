<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="simplicio-tasks architecture">
  <defs>
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39FF14"/><stop offset="1" stop-color="#00E08A"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#39FF14"/>
    </marker>
  </defs>
  <rect width="920" height="560" rx="18" fill="#0A0E0A"/>
  <text x="460" y="42" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="#F2FFF2">simplicio-tasks — how it runs</text>
  <text x="460" y="70" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#8FB89A">runtime-agnostic protocol · binds native speed if a host runtime is present, else LLM fallbacks</text>

  <!-- the loop ring -->
  <g font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600">
    <g fill="#0A0E0A">
      <rect x="60" y="110" width="150" height="46" rx="10" fill="#11201a" stroke="url(#ng)" stroke-width="1.6"/>
      <rect x="240" y="110" width="150" height="46" rx="10" fill="#11201a" stroke="url(#ng)" stroke-width="1.6"/>
      <rect x="420" y="110" width="150" height="46" rx="10" fill="#11201a" stroke="url(#ng)" stroke-width="1.6"/>
      <rect x="600" y="110" width="150" height="46" rx="10" fill="#11201a" stroke="url(#ng)" stroke-width="1.6"/>
    </g>
    <text x="135" y="138" text-anchor="middle" fill="#cdeccd">1 · Discover</text>
    <text x="315" y="138" text-anchor="middle" fill="#cdeccd">2 · Deep intake</text>
    <text x="495" y="138" text-anchor="middle" fill="#cdeccd">3 · Route + scale</text>
    <text x="675" y="138" text-anchor="middle" fill="#cdeccd">4 · Quality loop</text>
    <line x1="210" y1="133" x2="238" y2="133" stroke="#39FF14" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="390" y1="133" x2="418" y2="133" stroke="#39FF14" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="570" y1="133" x2="598" y2="133" stroke="#39FF14" stroke-width="2" marker-end="url(#arr)"/>

    <g fill="#0A0E0A">
      <rect x="600" y="184" width="150" height="46" rx="10" fill="#11201a" stroke="url(#ng)" stroke-width="1.6"/>
      <rect x="420" y="184" width="150" height="46" rx="10" fill="#11201a" stroke="url(#ng)" stroke-width="1.6"/>
      <rect x="240" y="184" width="150" height="46" rx="10" fill="#11201a" stroke="url(#ng)" stroke-width="1.6"/>
      <rect x="60"  y="184" width="150" height="46" rx="10" fill="#11201a" stroke="url(#ng)" stroke-width="1.6"/>
    </g>
    <text x="675" y="212" text-anchor="middle" fill="#cdeccd">5 · Safety gate</text>
    <text x="495" y="212" text-anchor="middle" fill="#cdeccd">6 · Deliver + PR</text>
    <text x="315" y="212" text-anchor="middle" fill="#cdeccd">6b · Feedback</text>
    <text x="135" y="212" text-anchor="middle" fill="#cdeccd">7 · 24/7 loop</text>
    <line x1="675" y1="156" x2="675" y2="182" stroke="#39FF14" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="598" y1="207" x2="572" y2="207" stroke="#39FF14" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="418" y1="207" x2="392" y2="207" stroke="#39FF14" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="238" y1="207" x2="212" y2="207" stroke="#39FF14" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M135,182 C135,168 135,168 135,158" stroke="#39FF14" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  </g>

  <!-- extension point buckets -->
  <text x="60" y="280" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#39FF14">43 extension points — native if bound, LLM fallback always</text>
  <g font-family="'Consolas',monospace" font-size="11.5" fill="#bfe0c4">
    <rect x="60" y="296" width="270" height="118" rx="10" fill="#0e1712" stroke="#1c2a1c"/>
    <text x="74" y="316" fill="#7fd08f" font-weight="700">Orchestration</text>
    <text x="74" y="336">dependency_graph · durable_workflow</text>
    <text x="74" y="354">work_queue · resource_governor · execute</text>
    <text x="74" y="372">issue_factory · autoscale · claim · worktree</text>
    <text x="74" y="390">source_adapter · model_route · model_preflight</text>
    <text x="74" y="406">plan · decide · intake</text>

    <rect x="345" y="296" width="270" height="118" rx="10" fill="#0e1712" stroke="#1c2a1c"/>
    <text x="359" y="316" fill="#7fd08f" font-weight="700">Quality + evidence</text>
    <text x="359" y="336">delivery_gate · validate · diagnostics</text>
    <text x="359" y="354">toolchain_detect · pr · evidence · retry</text>
    <text x="359" y="372">reuse_precedent · trajectory · learn</text>
    <text x="359" y="390">endpoint_compare · web_verify · status</text>
    <text x="359" y="406">savings_ledger · capability_rank</text>

    <rect x="630" y="296" width="230" height="118" rx="10" fill="#0e1712" stroke="#1c2a1c"/>
    <text x="644" y="316" fill="#7fd08f" font-weight="700">Tokens + safety</text>
    <text x="644" y="336">compress · prompt_budget</text>
    <text x="644" y="354">shell_exec · transform_guard</text>
    <text x="644" y="372">action_gate · security · human_gate</text>
    <text x="644" y="390">notify · checkpoint_restore</text>
    <text x="644" y="406">orient · recall · normalize · web_research</text>
  </g>

  <!-- positioning -->
  <g font-family="'Segoe UI',Arial,sans-serif">
    <rect x="60" y="436" width="800" height="96" rx="12" fill="#0e1712" stroke="#1c2a1c"/>
    <text x="76" y="462" font-size="14" font-weight="700" fill="#39FF14">Where it sits</text>
    <text x="76" y="488" font-size="12.5" fill="#bfe0c4">caveman = compress the talk (terser prose).   rtk = compress the commands (per-command output reduction).</text>
    <text x="76" y="510" font-size="12.5" fill="#F2FFF2">simplicio-tasks = the orchestrator that does the work end-to-end — and folds BOTH token tricks into a gated, evidence-backed loop.</text>
  </g>
</svg>
